<svg xmlns="http://www.w3.org/2000/svg" width="900" height="980" viewBox="0 0 900 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#15304f" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13aee8"/>
      <stop offset="1" stop-color="#087fc1"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #14223a; letter-spacing: 0; }
      .muted { fill: #65748c; }
      .title { font-size: 34px; font-weight: 880; }
      .button { font-size: 28px; font-weight: 850; }
      .body { font-size: 24px; font-weight: 700; }
      .small { font-size: 20px; font-weight: 650; }
    </style>
  </defs>

  <rect width="900" height="980" rx="18" fill="#f4f7fb"/>

  <g filter="url(#shadow)">
    <rect x="70" y="52" width="760" height="282" rx="14" fill="#ffffff" stroke="#d7e3f1"/>
  </g>
  <text x="112" y="118" class="title">执行操作</text>

  <rect x="112" y="154" width="676" height="64" rx="9" fill="#ffffff" stroke="#46c1ef" stroke-width="2"/>
  <text x="450" y="187" class="button" fill="#087fc1" text-anchor="middle" dominant-baseline="middle">查看翻译列表，当前 1/3</text>

  <rect x="112" y="236" width="324" height="64" rx="9" fill="url(#blue)"/>
  <text x="204" y="278" class="button" fill="#ffffff">安排新任务</text>
  <rect x="464" y="236" width="324" height="64" rx="9" fill="#ffffff" stroke="#efb5b5"/>
  <text x="556" y="278" class="button" fill="#b43434">终止翻译</text>

  <g opacity="0.95">
    <rect x="70" y="374" width="760" height="205" rx="14" fill="#ffffff" stroke="#d7e3f1"/>
    <text x="112" y="440" class="title">输出位置</text>
    <circle cx="118" cy="496" r="13" fill="#18a7dd"/>
    <circle cx="118" cy="496" r="6" fill="#ffffff"/>
    <text x="150" y="506" class="body">源目录内</text>
    <circle cx="118" cy="547" r="13" fill="#ffffff" stroke="#b9cbe0"/>
    <text x="150" y="557" class="body">自定义目录</text>
  </g>

  <g opacity="0.95">
    <rect x="70" y="608" width="760" height="280" rx="14" fill="#ffffff" stroke="#d7e3f1"/>
    <text x="112" y="674" class="title">任务参数</text>
    <text x="112" y="732" class="body">目标语言</text>
    <rect x="112" y="754" width="676" height="64" rx="9" fill="#ffffff" stroke="#cbd8e8"/>
    <text x="146" y="796" class="body">中文</text>
    <rect x="112" y="842" width="320" height="64" rx="9" fill="#f8fbff" stroke="#d7e3f1"/>
    <text x="146" y="884" class="body">3</text>
    <text x="198" y="884" class="small muted">页级重试</text>
    <rect x="468" y="842" width="320" height="64" rx="9" fill="#f8fbff" stroke="#d7e3f1"/>
    <text x="502" y="884" class="body">20</text>
    <text x="566" y="884" class="small muted">页生成并发</text>
  </g>
</svg>
