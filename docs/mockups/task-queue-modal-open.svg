<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1280" viewBox="0 0 2048 1280">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#17314f" flood-opacity="0.20"/>
    </filter>
    <filter id="modalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#0b1f36" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13aee8"/>
      <stop offset="1" stop-color="#087fc1"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #14223a; letter-spacing: 0; }
      .muted { fill: #65748c; }
      .tiny { font-size: 20px; font-weight: 650; }
      .small { font-size: 24px; font-weight: 700; }
      .body { font-size: 28px; font-weight: 700; }
      .title { font-size: 36px; font-weight: 850; }
      .brand { font-size: 42px; font-weight: 900; }
      .label { font-size: 25px; font-weight: 850; }
      .card-title { font-size: 31px; font-weight: 880; }
      .button { font-size: 27px; font-weight: 850; }
      .badge { font-size: 22px; font-weight: 850; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 22px; font-weight: 650; }
    </style>
  </defs>

  <rect width="2048" height="1280" rx="20" fill="#e9eef5"/>
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="2000" height="1232" rx="20" fill="#f4f7fb" stroke="#d9e2ec"/>
  </g>
  <rect x="24" y="24" width="2000" height="44" rx="20" fill="#fbfcfe"/>
  <rect x="24" y="48" width="2000" height="20" fill="#fbfcfe"/>
  <line x1="24" y1="68" x2="2024" y2="68" stroke="#dfe7f0"/>
  <circle cx="46" cy="46" r="10" fill="#ff5f57"/>
  <circle cx="78" cy="46" r="10" fill="#febc2e"/>
  <circle cx="110" cy="46" r="10" fill="#28c840"/>
  <text x="150" y="53" class="small" fill="#4c5a70">Translator</text>

  <g opacity="0.48">
    <rect x="24" y="69" width="430" height="1187" fill="#fbfdff"/>
    <line x1="454" y1="69" x2="454" y2="1256" stroke="#d5e1ef"/>
    <text x="58" y="126" class="brand">Translator</text>
    <text x="58" y="182" class="body muted">by OA | V5.0</text>
    <rect x="58" y="220" width="354" height="58" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
    <text x="90" y="258" class="button">Excel 翻译</text>
    <rect x="58" y="300" width="354" height="58" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
    <text x="90" y="338" class="button">Word 翻译</text>
    <rect x="58" y="380" width="354" height="58" rx="8" fill="#e6f7ff" stroke="#52caff" stroke-width="2"/>
    <text x="90" y="418" class="button" fill="#0876a6">PDF 翻译</text>
    <rect x="505" y="160" width="1468" height="130" rx="12" fill="#ffffff" stroke="#d7e3f1"/>
    <text x="540" y="214" class="card-title">源路径</text>
    <rect x="505" y="320" width="970" height="850" rx="12" fill="#ffffff" stroke="#d7e3f1"/>
    <text x="540" y="378" class="card-title">正在翻译</text>
    <text x="540" y="428" class="body">PDF #028 防火棉属地实验室检测报告</text>
    <rect x="1505" y="320" width="468" height="245" rx="12" fill="#ffffff" stroke="#d7e3f1"/>
    <text x="1540" y="380" class="card-title">执行操作</text>
    <rect x="1540" y="416" width="398" height="56" rx="8" fill="#ffffff" stroke="#4ec3ee" stroke-width="2"/>
    <text x="1667" y="453" class="button" fill="#087fc1">查看任务列表</text>
    <rect x="1540" y="486" width="398" height="56" rx="8" fill="url(#blue)"/>
    <text x="1654" y="523" class="button" fill="#ffffff">安排下一个任务</text>
  </g>

  <rect x="24" y="69" width="2000" height="1187" fill="#0d2138" opacity="0.28"/>

  <g filter="url(#modalShadow)">
    <rect x="466" y="150" width="1116" height="980" rx="16" fill="#ffffff" stroke="#c9d8e8"/>
  </g>
  <rect x="466" y="150" width="1116" height="92" rx="16" fill="#f8fbff"/>
  <rect x="466" y="220" width="1116" height="22" fill="#f8fbff"/>
  <line x1="466" y1="242" x2="1582" y2="242" stroke="#d7e3f1"/>

  <text x="510" y="210" class="title">任务列表</text>
  <text x="676" y="210" class="small muted">当前有 2 个排队任务，1 个同组任务正在运行</text>
  <rect x="1468" y="177" width="58" height="44" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
  <text x="1488" y="208" class="button">×</text>

  <g>
    <rect x="510" y="274" width="1028" height="132" rx="12" fill="#eaf8ff" stroke="#5cc8f2" stroke-width="2"/>
    <rect x="540" y="308" width="104" height="38" rx="19" fill="#e8f7ef"/>
    <text x="568" y="335" class="badge" fill="#16784f">运行中</text>
    <text x="666" y="334" class="body">PDF #028 防火棉属地实验室检测报告</text>
    <text x="666" y="374" class="small muted">PDF 翻译 · 中文 · API 并发组 A · 已用 3 / 20 槽 · 已完成 31 / 36 页</text>
    <rect x="1280" y="311" width="222" height="56" rx="8" fill="#ffffff" stroke="#4ec3ee"/>
    <text x="1338" y="348" class="button" fill="#087fc1">查看详情</text>
    <rect x="666" y="382" width="570" height="10" rx="5" fill="#dbe8f2"/>
    <rect x="666" y="382" width="490" height="10" rx="5" fill="url(#blue)"/>
  </g>

  <g>
    <rect x="510" y="430" width="1028" height="132" rx="12" fill="#fffaf0" stroke="#f0cf91"/>
    <rect x="540" y="464" width="126" height="38" rx="19" fill="#fff2da"/>
    <text x="565" y="491" class="badge" fill="#9a6519">等待槽位</text>
    <text x="690" y="490" class="body">PDF #029 防火棉补充扫描</text>
    <text x="690" y="530" class="small muted">PDF 翻译 · 中文 · API 并发组 A · 排队第 1 位</text>
    <text x="690" y="557" class="tiny muted">A 组出现空闲槽时自动启动</text>
    <rect x="1280" y="467" width="104" height="56" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
    <text x="1306" y="504" class="button">上移</text>
    <rect x="1398" y="467" width="104" height="56" rx="8" fill="#ffffff" stroke="#efb5b5"/>
    <text x="1424" y="504" class="button" fill="#b43434">取消</text>
  </g>

  <g>
    <rect x="510" y="586" width="1028" height="132" rx="12" fill="#fffaf0" stroke="#f0cf91"/>
    <rect x="540" y="620" width="126" height="38" rx="19" fill="#fff2da"/>
    <text x="565" y="647" class="badge" fill="#9a6519">等待槽位</text>
    <text x="690" y="646" class="body">Excel #041 材料台账</text>
    <text x="690" y="686" class="small muted">Excel 翻译 · 法文 · API 并发组 A · 排队第 2 位</text>
    <text x="690" y="713" class="tiny muted">任务内并发上限 5</text>
    <rect x="1280" y="623" width="104" height="56" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
    <text x="1306" y="660" class="button">上移</text>
    <rect x="1398" y="623" width="104" height="56" rx="8" fill="#ffffff" stroke="#efb5b5"/>
    <text x="1424" y="660" class="button" fill="#b43434">取消</text>
  </g>

  <g>
    <rect x="510" y="742" width="1028" height="132" rx="12" fill="#f7fbff" stroke="#d7e3f1"/>
    <rect x="540" y="776" width="126" height="38" rx="19" fill="#edf3f8"/>
    <text x="565" y="803" class="badge" fill="#557088">已完成</text>
    <text x="690" y="802" class="body">Word #017 会议纪要</text>
    <text x="690" y="842" class="small muted">Word 翻译 · 英文 · API 并发组 A · 07:44 完成 · 有 2 处需复核</text>
    <rect x="1280" y="779" width="222" height="56" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
    <text x="1338" y="816" class="button">查看结果</text>
  </g>

  <g>
    <rect x="510" y="910" width="1028" height="132" rx="12" fill="#f8fbff" stroke="#d7e3f1"/>
    <text x="540" y="960" class="card-title">API 并发组 A</text>
    <text x="540" y="1002" class="small muted">组容量 20；当前运行任务占 3 槽；排队任务会按顺序在空闲槽出现时自动开始。</text>
    <rect x="540" y="1020" width="650" height="14" rx="7" fill="#e2ecf5"/>
    <rect x="540" y="1020" width="98" height="14" rx="7" fill="url(#blue)"/>
    <text x="1218" y="1030" class="small muted">已用 3 / 20</text>
  </g>

  <rect x="1180" y="1062" width="170" height="56" rx="8" fill="#ffffff" stroke="#b9cbe0"/>
  <text x="1231" y="1099" class="button">关闭</text>
  <rect x="1368" y="1062" width="170" height="56" rx="8" fill="url(#blue)"/>
  <text x="1401" y="1099" class="button" fill="#ffffff">安排任务</text>
</svg>
