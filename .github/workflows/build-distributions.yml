name: Build Tauri macOS distributions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS ${{ matrix.architecture }} DMG
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 is an Apple Silicon runner; macos-13 is Intel.
          - architecture: arm64
            runner: macos-14
          - architecture: x86_64
            runner: macos-13
    env:
      MACOS_ARCH: ${{ matrix.architecture }}
      MACOS_MINIMUM_SYSTEM_VERSION: "12.0"
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            constraints-release-py311.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS release dependencies
        run: |
          python --version
          bash ./scripts/install_macos_dependencies.sh
          npm ci --prefix ui
      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v$(python -c 'import app_meta; print(app_meta.APP_VERSION)')"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match $expected" >&2
            exit 1
          fi
      - name: Run quality and macOS platform checks
        env:
          TRANSLATOR_APP_DATA_DIR: ${{ runner.temp }}/translator-tests/app-data
        run: |
          pwsh ./quality_gate.ps1
          python -m unittest discover -s tests
          npm run check --prefix ui
          npm run build --prefix ui
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo check --manifest-path src-tauri/Cargo.toml
      - name: Build and verify macOS DMG
        run: |
          PYTHON_BIN="$(command -v python)" bash ./scripts/build_macos_package.sh
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_macOS_${{ matrix.architecture }}
          path: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}

  release:
    name: Publish macOS release
    if: startsWith(github.ref, 'refs/tags/')
    needs: macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.0
        with:
          pattern: Translator_macOS_*
          path: release-assets
          merge-multiple: true
      - name: Verify both macOS assets are present
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          arm_dmg=(release-assets/Translator_macOS_arm64_*.dmg)
          arm_sha=(release-assets/Translator_macOS_arm64_*.dmg.sha256)
          x64_dmg=(release-assets/Translator_macOS_x64_*.dmg)
          x64_sha=(release-assets/Translator_macOS_x64_*.dmg.sha256)
          test "${#arm_dmg[@]}" -eq 1
          test "${#arm_sha[@]}" -eq 1
          test "${#x64_dmg[@]}" -eq 1
          test "${#x64_sha[@]}" -eq 1
      - uses: softprops/action-gh-release@v3.0.0
        with:
          files: release-assets/*
