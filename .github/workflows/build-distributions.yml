name: Build distributions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Run quality gate
        shell: pwsh
        run: ./quality_gate.ps1

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build_windows_package.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_Windows_Setup
          path: |
            ${{ env.WINDOWS_SETUP }}
            ${{ env.WINDOWS_SETUP_SHA256 }}

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.WINDOWS_SETUP }}
            ${{ env.WINDOWS_SETUP_SHA256 }}

  macos:
    name: macOS dmg
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          bash ./scripts/install_macos_dependencies.sh

      - name: Build macOS dmg
        run: bash ./scripts/build_macos_package.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_macOS_DMG
          path: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}

      - name: Upload macOS release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}
