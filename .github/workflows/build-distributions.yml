name: Build distributions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            constraints-release-py311.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade --constraint constraints-release-py311.txt pip
          python -m pip install --constraint constraints-release-py311.txt --requirement requirements-build.txt
          python scripts/verify_release_dependencies.py --constraints constraints-release-py311.txt

      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $expected = "v$(python -c 'import app_meta; print(app_meta.APP_VERSION)')"
          if ($env:GITHUB_REF_NAME -ne $expected) {
            throw "Tag $env:GITHUB_REF_NAME does not match application version $expected"
          }

      - name: Run quality gate
        shell: pwsh
        run: ./quality_gate.ps1

      - name: Run tests
        timeout-minutes: 20
        env:
          QT_QPA_PLATFORM: offscreen
          TRANSLATOR_APP_DATA_DIR: ${{ runner.temp }}/translator-tests/app-data
        run: python -m unittest discover -s tests

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        timeout-minutes: 30
        shell: pwsh
        run: ./scripts/build_windows_package.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_Windows_Setup
          path: |
            ${{ env.WINDOWS_SETUP }}
            ${{ env.WINDOWS_SETUP_SHA256 }}

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.WINDOWS_SETUP }}
            ${{ env.WINDOWS_SETUP_SHA256 }}

  macos:
    name: macOS dmg
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            constraints-release-py311.txt

      - name: Install dependencies
        run: |
          bash ./scripts/install_macos_dependencies.sh

      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v$(python -c 'import app_meta; print(app_meta.APP_VERSION)')"
          test "$GITHUB_REF_NAME" = "$expected" || {
            echo "Tag $GITHUB_REF_NAME does not match application version $expected" >&2
            exit 1
          }

      - name: Run quality gate
        shell: pwsh
        run: ./quality_gate.ps1

      - name: Run tests
        timeout-minutes: 20
        env:
          QT_QPA_PLATFORM: offscreen
          TRANSLATOR_APP_DATA_DIR: ${{ runner.temp }}/translator-tests/app-data
        run: python -m unittest discover -s tests

      - name: Build macOS dmg
        timeout-minutes: 30
        run: bash ./scripts/build_macos_package.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_macOS_DMG
          path: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}

      - name: Upload macOS release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}
