name: Build Tauri distributions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows NSIS installer
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            constraints-release-py311.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade --constraint constraints-release-py311.txt pip
          python -m pip install --constraint constraints-release-py311.txt --requirement requirements-build.txt
          python scripts/verify_release_dependencies.py --constraints constraints-release-py311.txt
          npm ci --prefix ui
      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $expected = "v$(python -c 'import app_meta; print(app_meta.APP_VERSION)')"
          if ($env:GITHUB_REF_NAME -ne $expected) { throw "Tag $env:GITHUB_REF_NAME does not match $expected" }
      - name: Run quality and tests
        shell: pwsh
        env:
          TRANSLATOR_APP_DATA_DIR: ${{ runner.temp }}/translator-tests/app-data
        run: |
          ./quality_gate.ps1
          python -m unittest discover -s tests
          npm run check --prefix ui
          cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build_windows_package.ps1
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_Windows_Setup
          path: |
            ${{ env.WINDOWS_SETUP }}
            ${{ env.WINDOWS_SETUP_SHA256 }}
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.WINDOWS_SETUP }}
            ${{ env.WINDOWS_SETUP_SHA256 }}

  macos:
    name: macOS dmg
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            constraints-release-py311.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          bash ./scripts/install_macos_dependencies.sh
          npm ci --prefix ui
      - name: Run quality and tests
        env:
          TRANSLATOR_APP_DATA_DIR: ${{ runner.temp }}/translator-tests/app-data
        run: |
          pwsh ./quality_gate.ps1
          python -m unittest discover -s tests
          npm run check --prefix ui
          cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build macOS dmg
        run: bash ./scripts/build_macos_package.sh
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Translator_macOS_DMG
          path: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.MACOS_DMG }}
            ${{ env.MACOS_DMG_SHA256 }}
